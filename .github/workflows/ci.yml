name: CI

on:
  push:
  pull_request:

jobs:
  python-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest
      - name: Run spike tool tests
        run: cd tools && python -m pytest -q

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native deps (serialport needs libudev; Tauri 2 needs webkit2gtk/gtk3/rsvg2)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build and test workspace
        run: cargo test --workspace

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E smoke test
        run: npm run e2e
